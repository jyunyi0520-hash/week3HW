<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>🌸 夢幻馬卡龍記帳本</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    function onGisLoaded() {
      if (window.initGis) window.initGis();
    }
  </script>
  <script src="https://accounts.google.com/gsi/client" async defer onload="onGisLoaded()"></script>
</head>

<body>
  <div class="app-wrapper">
    <header class="container">
      <div class="header-content">
        <h1 class="logo"><i class="fa-solid fa-wand-magic-sparkles"></i> 夢幻記帳本</h1>
        <div class="auth-btns">
          <button id="btnSignIn" class="btn btn-login"><i class="fa-brands fa-google"></i> 登入</button>
          <button id="btnSignOut" class="btn btn-outline" style="display:none;"><i class="fa-solid fa-right-from-bracket"></i> 登出</button>
        </div>
      </div>
    </header>

    <main class="container main-grid">
      <section class="card-glass">
        <h2 class="section-title"><i class="fa-solid fa-pen-fancy"></i> 紀錄一筆小確幸</h2>
        <form id="recordForm" class="cute-form">
          <div class="input-group">
            <label><i class="fa-solid fa-calendar-day"></i> 日期</label>
            <input id="fDate" type="date" required />
          </div>
          <div class="row-2">
            <div class="input-group">
              <label><i class="fa-solid fa-tags"></i> 類型</label>
              <select id="fType" required>
                <option value="支出">💸 支出</option>
                <option value="收入">💰 收入</option>
              </select>
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-layer-group"></i> 分類</label>
              <select id="fCategory" required></select>
            </div>
          </div>
          <div class="row-2">
            <div class="input-group">
              <label><i class="fa-solid fa-credit-card"></i> 付款</label>
              <select id="fPayment" required></select>
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-coins"></i> 金額</label>
              <input id="fAmount" type="number" min="0" step="1" required placeholder="0" />
            </div>
          </div>
          <div class="input-group">
            <label><i class="fa-solid fa-comment-dots"></i> 說明</label>
            <input id="fDescription" type="text" placeholder="買了什麼呢？" required />
          </div>
          <div class="form-actions">
            <button id="btnSubmit" class="btn btn-submit" type="submit" disabled>
              <i class="fa-solid fa-heart"></i> 儲存紀錄
            </button>
            <button id="btnReload" class="btn btn-icon" type="button" disabled>
              <i class="fa-solid fa-arrows-rotate"></i>
            </button>
          </div>
          <p id="status" class="status-text">載入中...</p>
        </form>
      </section>

      <section class="card-glass">
        <div class="section-header">
          <h2 class="section-title"><i class="fa-solid fa-chart-line"></i> 本月概覽</h2>
          <input id="monthPicker" type="month" disabled class="month-selector" />
        </div>
        <div class="stats-container">
          <div class="stat-item inc">
            <span class="stat-label">收入</span>
            <div id="sumIncome" class="stat-value">0</div>
          </div>
          <div class="stat-item exp">
            <span class="stat-label">支出</span>
            <div id="sumExpense" class="stat-value">0</div>
          </div>
          <div class="stat-item net">
            <span class="stat-label">結餘</span>
            <div id="sumNet" class="stat-value">0</div>
          </div>
        </div>
        <h3 class="sub-title">支出排行榜 🏆</h3>
        <div id="categoryBreakdown" class="breakdown-area"></div>
      </section>

      <section class="card-glass full-width">
        <div class="section-header">
          <h2 class="section-title"><i class="fa-solid fa-list-check"></i> 明細小報</h2>
          <button id="btnRefresh" class="btn btn-outline btn-sm" disabled><i class="fa-solid fa-sync"></i> 刷新</button>
        </div>
        <div class="table-scroll">
          <table class="macaron-table">
            <thead>
              <tr>
                <th>日期</th>
                <th>類型</th>
                <th>分類</th>
                <th class="text-right">金額</th>
                <th>說明</th>
                <th>方式</th>
              </tr>
            </thead>
            <tbody id="recordsTbody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
